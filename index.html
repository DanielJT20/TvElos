<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV ELOS | Audiovisual Universitário</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="logo">TV ELOS</a>
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
            <nav>
                <ul>
                    <li><a href="programas.html">Programas</a></li>
                    <li><a href="projetos.html">Projetos</a></li>
                    <li><a href="sobre.html">TV ELOS</a></li>
                    <li><a href="processo.html">Processo</a></li>
                    <li><a href="contato.html">Contato</a></li>
                    <li><a href="transparencia.html">Transparência</a></li>
                    <li><button class="theme-toggle-btn" onclick="alternarTemaGlobal()">☀️</button></li>
                    <li><button class="login-btn" onclick="toggleModal()">Entrar</button></li>
                </ul>
            </nav>
        </header>

        <section class="hero">
            <h1>Conectando Ideias,<br>Amplificando Vozes</h1>
            <p>A plataforma audiovisual integrada de submissão de pautas e inteligência corporativa de audiência universitária.</p>
            <a href="projetos.html"><button class="submit-btn">Enviar uma Pauta</button></a>
        </section>

        <div class="modal" id="loginModal">
            <div class="modal-content">
                <button class="modal-close" onclick="toggleModal()">×</button>
                <div class="modal-tabs">
                    <button class="modal-tab active" data-tab="login">LOGIN</button>
                    <button class="modal-tab" data-tab="cadastro">NOVA CONTA</button>
                </div>

                <form id="form-login">
                    <div class="form-group">
                        <label for="login-email">E-mail</label>
                        <input type="email" id="login-email" required placeholder="seuemail@ufrj.br">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Senha</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="submit-btn" style="width: 100%; margin-top: 10px;">Entrar na Plataforma</button>
                </form>

                <form id="form-cadastro" style="display: none;">
                    <div class="form-group">
                        <label for="cadastro-nome">Nome Completo</label>
                        <input type="text" id="cadastro-nome" placeholder="Seu Nome">
                    </div>
                    <div class="form-group">
                        <label for="cadastro-email">E-mail Corporativo</label>
                        <input type="email" id="cadastro-email" placeholder="nome@ufrj.br">
                    </div>
                    <div class="form-group">
                        <label for="cadastro-senha">Senha de Acesso</label>
                        <input type="password" id="cadastro-senha" placeholder="Mínimo 6 dígitos">
                    </div>
                    <button type="submit" class="submit-btn" style="width: 100%; margin-top: 10px;">Criar Conta</button>
                </form>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 TV ELOS. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
